server:
  port: 8087

spring:
  application:
    name: servico-notificacao
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:servico-notificacao}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:condominio_notificacao}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0

security:
  jwt:
    secret: condominio-jwt-secret-local-2026-seguro
    issuer: servico-identidade

identity:
  base-url: ${SERVICO_IDENTIDADE_URL:http://localhost:8081}
  service-username: ${IDENTITY_SERVICE_USERNAME:admin}
  service-password: ${IDENTITY_SERVICE_PASSWORD:admin}

usuario:
  base-url: ${SERVICO_USUARIO_URL:http://localhost:8082}

app:
  kafka:
    topics:
      encomenda-recebida: ${TOPICO_ENCOMENDA_RECEBIDA:encomenda.recebida}
    consumer:
      group-id: ${KAFKA_GROUP_ID:servico-notificacao}
