spring:
  application:
    name: servico-notificacao

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:servico-notificacao}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  
  datasource:
    url: jdbc:postgresql://postgres-notificacao:5432/condominio_notificacao
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8084

logging:
  level:
    root: INFO
    br.com.condominio: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0

identity:
  base-url: ${SERVICO_IDENTIDADE_URL:http://servico-identidade:8081}
  service-username: ${IDENTITY_SERVICE_USERNAME:admin}
  service-password: ${IDENTITY_SERVICE_PASSWORD:admin}

usuario:
  base-url: ${SERVICO_USUARIO_URL:http://servico-usuario:8082}

app:
  kafka:
    topics:
      encomenda-recebida: ${TOPICO_ENCOMENDA_RECEBIDA:encomenda.recebida}
    consumer:
      group-id: ${KAFKA_GROUP_ID:servico-notificacao}
