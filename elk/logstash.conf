input {
  beats {
    port => 5044
  }
}

filter {
  # Fallback parser for JSON logs when Filebeat does not decode the message.
  if ![app][service] and [message] =~ "^\{" {
    json {
      source => "message"
      target => "app"
      tag_on_failure => []
    }
  }

  # Prefer service name from structured app logs.
  if [app][service] {
    mutate {
      add_field => { "[service][name]" => "%{[app][service]}" }
    }
  } else if [app][service][name] {
    mutate {
      add_field => { "[service][name]" => "%{[app][service][name]}" }
    }
  } else if [app][service.name] {
    mutate {
      add_field => { "[service][name]" => "%{[app][service.name]}" }
    }
  }

  # Add service name from container labels when app logs are not structured.
  if ![service][name] and [container][labels][logging.service] {
    mutate {
      add_field => { "[service][name]" => "%{[container][labels][logging.service]}" }
    }
  } else if ![service][name] and [container][labels][logging_service] {
    mutate {
      add_field => { "[service][name]" => "%{[container][labels][logging_service]}" }
    }
  } else if ![service][name] and [container][labels][com.docker.compose.service] {
    mutate {
      add_field => { "[service][name]" => "%{[container][labels][com.docker.compose.service]}" }
    }
  }

  # Last fallback: derive service from container name.
  if ![service][name] and [container][name] {
    mutate {
      add_field => { "[service][name]" => "%{[container][name]}" }
    }
  }

  if [service][name] =~ "^/" {
    mutate {
      gsub => [ "[service][name]", "^/", "" ]
    }
  }

  # Ignore events that are not from application services.
  if ![service][name] {
    drop { }
  }

  # Extract timestamp from application JSON logs, when available.
  if [app][@timestamp] {
    date {
      match => [ "[app][@timestamp]", "ISO8601" ]
      target => "@timestamp"
    }
  }

  # Extract log level.
  if [app][level] {
    mutate {
      add_field => { "log_level" => "%{[app][level]}" }
    }
  }

  # Extract trace ID if present (snake_case and camelCase variants).
  if [app][trace_id] {
    mutate {
      add_field => { "trace_id" => "%{[app][trace_id]}" }
    }
  } else if [app][traceId] {
    mutate {
      add_field => { "trace_id" => "%{[app][traceId]}" }
    }
  }

  # Extract span ID if present (snake_case and camelCase variants).
  if [app][span_id] {
    mutate {
      add_field => { "span_id" => "%{[app][span_id]}" }
    }
  } else if [app][spanId] {
    mutate {
      add_field => { "span_id" => "%{[app][spanId]}" }
    }
  }

  # Keep a cleaner top-level message for structured app logs.
  if [app][message] {
    mutate {
      replace => { "message" => "%{[app][message]}" }
    }
  }

  # Avoid mapping conflicts between app.service (string) and app.service.name (object path).
  if [app][service] {
    mutate {
      remove_field => [ "[app][service]" ]
    }
  }

  # Add environment
  mutate {
    add_field => { "environment" => "docker" }
  }

  # Clean up unnecessary fields
  mutate {
    remove_field => [ "agent", "ecs", "host", "input", "log", "stream" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "condominio-logs-%{+YYYY.MM.dd}"
  }
}
