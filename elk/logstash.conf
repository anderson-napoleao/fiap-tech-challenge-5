input {
  beats {
    port => 5044
  }
}

filter {
  # Parse JSON logs from Spring Boot
  if [message] {
    json {
      source => "message"
      target => "spring"
    }
  }

  # Add service name from container labels
  if [docker][container][labels]["logging.service"] {
    mutate {
      add_field => { "service" => "%{[docker][container][labels][logging.service]}" }
    }
  }

  # Extract timestamp from Spring Boot logs
  if [spring][timestamp] {
    date {
      match => [ "[spring][timestamp]", "ISO8601" ]
      target => "@timestamp"
    }
  }

  # Extract log level
  if [spring][level] {
    mutate {
      add_field => { "log_level" => "%{[spring][level]}" }
    }
  }

  # Extract trace ID if present
  if [spring][traceId] {
    mutate {
      add_field => { "trace_id" => "%{[spring][traceId]}" }
    }
  }

  # Extract span ID if present
  if [spring][spanId] {
    mutate {
      add_field => { "span_id" => "%{[spring][spanId]}" }
    }
  }

  # Add environment
  mutate {
    add_field => { "environment" => "docker" }
  }

  # Clean up unnecessary fields
  mutate {
    remove_field => [ "agent", "ecs", "host", "input", "log" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "condominio-logs-%{+YYYY.MM.dd}"
  }
}
