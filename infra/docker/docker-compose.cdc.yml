services:
  postgres-identidade:
    image: debezium/postgres:16
    container_name: condominio-postgres-identidade
    ports:
      - "5431:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: condominio_identidade
    networks:
      - cdc-net

  postgres:
    image: debezium/postgres:16
    container_name: condominio-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: condominio
    networks:
      - cdc-net

  postgres-usuario:
    image: debezium/postgres:16
    container_name: condominio-postgres-usuario
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: condominio_usuario
    networks:
      - cdc-net

  postgres-notificacao:
    image: debezium/postgres:16
    container_name: condominio-postgres-notificacao
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: condominio_notificacao
    networks:
      - cdc-net

  zookeeper:
    image: quay.io/debezium/zookeeper:2.7
    container_name: condominio-zookeeper
    ports:
      - "2181:2181"
    networks:
      - cdc-net

  kafka:
    image: quay.io/debezium/kafka:2.7
    container_name: condominio-kafka
    ports:
      - "9092:9092"
    environment:
      ZOOKEEPER_CONNECT: zookeeper:2181
    depends_on:
      - zookeeper
    networks:
      - cdc-net

  connect:
    image: quay.io/debezium/connect:2.7
    container_name: condominio-connect
    ports:
      - "8084:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    depends_on:
      - kafka
      - postgres-identidade
      - postgres
      - postgres-usuario
      - postgres-notificacao
    networks:
      - cdc-net

  adminer:
    image: adminer:4
    container_name: condominio-adminer
    ports:
      - "8085:8080"
    depends_on:
      - postgres-identidade
      - postgres
      - postgres-usuario
      - postgres-notificacao
    networks:
      - cdc-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: condominio-kafka-ui
    ports:
      - "8086:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: condominio
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://connect:8083
    depends_on:
      - kafka
      - connect
    networks:
      - cdc-net

networks:
  cdc-net:
    driver: bridge
