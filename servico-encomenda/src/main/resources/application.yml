server:
  port: 8083

spring:
  application:
    name: servico-encomenda
  datasource:
    url: jdbc:h2:mem:servico_encomenda;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0

security:
  jwt:
    secret: condominio-jwt-secret-local-2026-seguro
    issuer: servico-identidade
