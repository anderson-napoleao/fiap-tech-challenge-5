spring:
  datasource:
    url: jdbc:h2:mem:servico_encomenda_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  jwt:
    secret: condominio-jwt-secret-local-2026-seguro
    issuer: servico-identidade
